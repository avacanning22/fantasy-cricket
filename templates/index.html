<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Cricket</title>
    <style>
        body {
            background-color: #FFF9C4;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .welcome {
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 5px; /* tight gap */
            color: #333;
        }

        .title {
            font-size: 55px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 5px; /* tight gap */
            color: #333;
        }

        .logo {
            width: 250px; /* bigger logo */
            margin: 5px 0; /* tight gap */
        }

        .buttons {
            margin-top: 30px; /* space between top section and buttons */
        }

        .button {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            background-color: #FFD54F;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s;
        }

        .button:hover {
            background-color: #FFC107;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="welcome">Welcome to</div>

    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="logo">

    <div class="title">Fantasy League</div>

    <div class="buttons">
        <a href="{{ url_for('how_it_works') }}" class="button">Information and Game Rules</a>
        <a href="{{ url_for('login') }}" class="button">Login / Sign Up</a>
    </div>

</div>

<footer>
    &copy; 2026 Fantasy Cricket League
</footer>

</body>
</html>
