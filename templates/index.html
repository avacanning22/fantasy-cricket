<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Cricket</title>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg: #f6f7fb;
            --card: #ffffff;
            --text: #18212f;
            --muted: #6b7280;
            --border: #e7eaf0;
            --maroon: #7b1020;
            --gold: #f5c84c;
            --gold-dark: #e1b534;
            --shadow: 0 10px 24px rgba(16, 24, 40, 0.08);
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, #fff4cc 0%, #f6f7fb 28%),
                var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
        }

        .top-shell {
            background: linear-gradient(135deg, var(--maroon) 0%, #90162a 55%, #b11f38 100%);
            color: white;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
        }

        .navbar {
            max-width: 1240px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 0.7fr auto 1.3fr;
            align-items: center;
            padding: 22px 20px 18px;
        }

        .navbar-center {
            display: flex;
            justify-content: center;
        }

        .navbar-right {
            display: flex;
            justify-content: flex-end;
        }

        .navbar img.logo-main {
            height: 108px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.18));
        }

        .sponsor-box {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 12px 18px;
        }

        .sponsor-box img {
            height: 60px;
            border-radius: 8px;
        }

        .nav-bar-wrap {
            background: rgba(255,255,255,0.1);
        }

        .nav-bar {
            max-width: 1240px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
        }

        .nav-bar a {
            text-align: center;
            color: white;
            padding: 16px;
            font-weight: 700;
            text-decoration: none;
        }

        .nav-bar a.active,
        .nav-bar a:hover {
            background: rgba(255,255,255,0.12);
        }

        .page {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 32px;
        }

        .hero-card {
            width: min(1100px, 96%);
            background: white;
            border-radius: 28px;
            box-shadow: var(--shadow);
            padding: 42px;
        }

        .hero-copy h1 {
            font-size: 48px;
            font-weight: 800;
        }

        .cta-row {
            margin-top: 20px;
            display: flex;
            gap: 14px;
        }

        .button {
            padding: 14px 22px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 800;
        }

        .button-primary {
            background: var(--gold);
        }

        .button-secondary {
            border: 1px solid var(--border);
        }

        .payment-section {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .payment-card {
            background: linear-gradient(135deg, #fff4d0 0%, #fff9e8 100%);
            border-radius: 18px;
            padding: 24px;
            text-align: center;
            max-width: 420px;
            box-shadow: var(--shadow);
        }

        .payment-title {
            font-weight: 800;
            margin-bottom: 8px;
        }

        .payment-text {
            font-size: 18px;
            font-weight: 700;
        }

        .payment-subtext {
            margin-top: 6px;
            color: var(--muted);
        }

        /* NEW IMAGE TILE */
        .payment-image-tile {
            margin-top: 18px;
            background: white;
            border-radius: 14px;
            padding: 10px;
            display: inline-block;
            box-shadow: var(--shadow);
        }

        .payment-image-tile img {
            max-width: 180px;
            border-radius: 10px;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #777;
        }

    </style>

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
</head>

<body>

<div class="top-shell">
    <div class="navbar">
        <div></div>
        <div class="navbar-center">
            <img src="{{ url_for('static', filename='logo_fantasy.png') }}">
        </div>
        <div class="navbar-right">
            <div class="sponsor-box">
                <span>Sponsored by</span>
                <img src="{{ url_for('static', filename='aerial.jpg') }}">
            </div>
        </div>
    </div>

    <div class="nav-bar-wrap">
        <div class="nav-bar">
            <a href="{{ url_for('index') }}" class="active">Home</a>
            <a href="{{ url_for('how_it_works') }}">How It Works</a>
            <a href="{{ url_for('login') }}">Login / Register</a>
        </div>
    </div>
</div>

<div class="page">
    <div class="hero-card">
        <div class="hero-copy">
            <h1>Support the women’s section through fantasy cricket.</h1>
            <p>
                Select your fantasy team, follow performances, and compete in the league.
            </p>

            <div class="cta-row">
                <a href="{{ url_for('login') }}" class="button button-primary">Login / Sign Up</a>
                <a href="{{ url_for('how_it_works') }}" class="button button-secondary">Rules</a>
            </div>
        </div>
    </div>
</div>

<div class="payment-section">
    <div class="payment-card">
        <div class="payment-title">Entry Fee</div>
        <div class="payment-text">
            Pay <strong>€25</strong> to <strong>Sue O'Connor</strong>
        </div>
        <div class="payment-subtext">
            Once paid, you’re ready to play!
        </div>

        <!-- REVTAG IMAGE -->
        <div class="payment-image-tile">
            <img src="{{ url_for('static', filename='revtag.jpeg') }}" alt="Revtag">
        </div>
    </div>
</div>

<footer>
    &copy; 2026 Fantasy Cricket League
</footer>

</body>
</html>
